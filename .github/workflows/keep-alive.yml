name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ping All Projects
        run: |
          # 🔥 Flames Finder
          curl -s -X GET "https://teziphucpvvqghwhcvyq.supabase.co/rest/v1/flames_calculations" \
          -H "apikey: ${{ secrets.SUPABASE_KEY_1 }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY_1 }}"

          # 🛒 Ecommerce
          curl -s -X GET "https://ifxofuzxczwrvhlxzbgz.supabase.co/rest/v1/products" \
          -H "apikey: ${{ secrets.SUPABASE_KEY_2 }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY_2 }}"

          # ⚡ Third Project
          curl -s -X GET "https://rnkretlgnqqxipnnbgqf.supabase.co/rest/v1/hotels" \
          -H "apikey: ${{ secrets.SUPABASE_KEY_3 }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY_3 }}"

      - name: Keep repository active
        run: |
          echo "Last active: $(date)" > keepalive.txt

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add keepalive.txt

          git commit -m "Keep repository active" || echo "No changes"

          git push
